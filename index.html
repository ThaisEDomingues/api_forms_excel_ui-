<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Seu App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarelo-destaque: #FFD700; /* Tom de amarelo escolhido */
            --verde-floresta: #2d5a27;
            --fundo: #f9f7f2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--fundo);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            width: 900px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Lado Esquerdo: Imagem Floresta + Mockup */
        .visual-side {
            flex: 1;
            background: url('https://images.unsplash.com/photo-1448375240586-882707325603') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .visual-side::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3); /* Filtro para legibilidade */
        }

        /* Lado Direito: Formulário */
        .form-side {
            flex: 1;
            padding: 40px;
        }

        h1 { color: #333; }

        .scale-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .radio-btn {
            width: 40px;
            height: 40px;
            border: 2px solid var(--amarelo-destaque);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .radio-btn:hover, .radio-btn:active {
            background-color: var(--amarelo-destaque);
            color: white;
        }

        button {
            background-color: var(--amarelo-destaque);
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="visual-side">
        </div>
    <div class="form-side">
        <h1>Como está sua experiência?</h1>
        <p>Sua opinião nos ajuda a crescer nossa floresta digital.</p>
        
        <form>
            <label>O quanto você indicaria nosso app?</label>
            <div class="scale-group">
                <div class="radio-btn">1</div>
                <div class="radio-btn">2</div>
                <div class="radio-btn">3</div>
                <div class="radio-btn">4</div>
                <div class="radio-btn">5</div>
            </div>
            
            <textarea style="width: 100%; height: 80px; margin-top:10px; border-radius:8px; border:1px solid #ccc;" placeholder="Conte-nos o que você pensa..."></textarea>
            
            <button type="submit">Enviar Feedback</button>
        </form>
    </div>
</div>

</body>
</html>
