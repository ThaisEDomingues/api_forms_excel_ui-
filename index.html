<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #b2ebf2); /* Fundo Azul Claro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
        }
        .forest-header {
            height: 150px;
            background: url('SUA_IMAGEM_FLORESTA_AQUI.jpg') center/cover;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .btn-scale {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid #00796b; /* Azul esverdeado de floresta */
            border-radius: 8px;
            cursor: pointer;
            background: white;
        }
        .btn-scale:hover { background: #00796b; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="forest-header"></div>
        <h2>Como podemos melhorar?</h2>
        <p>Sua jornada é parte da nossa floresta.</p>
        <div>
            <button class="btn-scale">1</button>
            <button class="btn-scale">2</button>
            <button class="btn-scale">3</button>
            <button class="btn-scale">4</button>
            <button class="btn-scale">5</button>
        </div>
    </div>
</body>
</html>
